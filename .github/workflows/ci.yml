name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group lint --group types

      - name: Run prek
        run: uvx prek run --all-files --show-diff-on-failure

  test:
    name: test ${{ matrix.tox-env }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tox-env:
          - py312-lowest
          - py312-jax0.5.3
          - py312-jax0.6.2
          - py312-jax0.7.2
          - py312-jax0.8.2
          - py312-jax0.9.1
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Run tests
        if: matrix.tox-env != 'py312-jax0.9.1'
        run: uvx --with tox-uv tox -e ${{ matrix.tox-env }} -- -n 3

      - name: Run tests with coverage
        if: matrix.tox-env == 'py312-jax0.9.1'
        run: uvx --with tox-uv tox -e py312-jax0.9.1 -- -n 3 --cov --cov-branch --cov-report=xml --junitxml=junit.xml -o junit_family=legacy

      - name: Upload coverage to Codecov
        if: matrix.tox-env == 'py312-jax0.9.1'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: bytedance/jaqmc

      - name: Upload test results to Codecov
        if: ${{ matrix.tox-env == 'py312-jax0.9.1' && !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: bytedance/jaqmc
